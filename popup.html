<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Capture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #1a1a1c;
      --border: #2a2a2e;
      --accent: #c8f135;
      --accent-dim: #a8cc1a;
      --text: #f0f0ee;
      --muted: #666670;
      --danger: #ff4d4d;
      --radius: 10px;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      padding: 20px;
      user-select: none;
    }

    /* 헤더 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    /* 토글 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 999px;
      transition: background 0.25s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    input:checked + .slider {
      background: var(--accent);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--bg);
    }

    /* 상태 카드 */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      min-height: 70px;
    }

    .status-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-title {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .status-url {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-empty {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 다운로드 버튼 */
    .btn-download {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn-download:hover:not(:disabled) {
      background: var(--accent-dim);
    }

    .btn-download:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-download:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* 하단 메시지 */
    .footer-msg {
      margin-top: 12px;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    .footer-msg.off {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">PAGE<span>CAP</span></div>
    <div id="version" style="font-size:10px; color: var(--muted);">v</div>
  </div>

  <!-- ON/OFF 토글 -->
  <div class="toggle-row">
    <span class="toggle-label">캡처 활성화</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleSwitch" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- 다운로드 버튼 -->
  <button class="btn-download" id="btnDownload" disabled>HTML 다운로드</button>

  <div class="footer-msg" id="footerMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
